Neos:
  Flow:
    i18n:
      defaultLocale: en
  Neos:
    userInterface:
      defaultLanguage: en
      translation:
        autoInclude:
          Neos.DocsNeosIo:
            - Main
            - 'NodeTypes/*'
Neos:
  Neos:
    sites:
      '*':
        contentDimensions:
          resolver:
            factoryClassName: Neos\Neos\FrontendRouting\DimensionResolution\Resolver\UriPathResolverFactory
            options:
              segments:
                -
                  dimensionIdentifier: language
                  # dimensionValue => uriPathSegment (empty uriPathSegment allowed)
                  dimensionValueMapping:
                    en: ''
                    de: 'de'
  ContentRepositoryRegistry:
    contentRepositories:
      default:
        contentDimensions:
          language:
            label: Languages
            icon: icon-language
            values:
              en:
                label: English
              de:
                label: German
